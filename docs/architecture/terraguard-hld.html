<title>TerraGuard HLD</title>
<style>
  :root {
    --ink: #0f172a;
    --muted: #475569;
    --line: #cbd5e1;
    --input-bg: #e8f0fb;
    --input-stroke: #2d6ac7;

    --sync: #64748b;
    --async: #1d9e75;
    --policy: #d85a30;
    --telemetry: #556ee6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f8fafc;
    color: var(--ink);
    padding: 20px;
  }
  .wrap {
    max-width: 1700px;
    margin: 0 auto;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
  }
  .head {
    background: #0f172a;
    color: #f8fafc;
    padding: 16px 24px;
    border-bottom: 1px solid #1e293b;
  }
  .head h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .head p {
    font-size: 12px;
    color: #cbd5e1;
    margin-top: 6px;
  }
  .foot {
    border-top: 1px solid #e2e8f0;
    background: #f8fafc;
    color: #64748b;
    font-size: 12px;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
  }
  svg text {
    dominant-baseline: middle;
  }
</style>
</head>
